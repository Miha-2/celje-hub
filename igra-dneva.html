<!doctype html>
<html lang="sl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Igra dneva – NK Celje</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue-mid:  #243480;
      --muted:     #8fa0cc;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Barlow', sans-serif;
      color: #e8eeff;
      min-height: 100dvh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-fixed {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(46,66,160,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(26,42,94,0.3) 0%, transparent 50%),
        #06091f;
      z-index: 0;
    }

    .bg-fixed::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      padding: 32px 24px;
      max-width: 360px;
    }

    .icon {
      font-size: 48px;
      line-height: 1;
    }

    .title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 42px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #fff;
      line-height: 1;
    }

    .sub {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.5;
    }

    .back-btn {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-decoration: none;
      transition: background 0.18s, border-color 0.18s;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.35);
    }

    .back-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2.5;
      fill: none;
    }
  </style>
</head>
<body>

  <div class="bg-fixed"></div>

  <div class="content">
    <img src="celje.png" alt="NK Celje" style="width:110px;height:110px;object-fit:contain;filter:drop-shadow(0 0 16px rgba(255,255,255,0.2));">
    <h1 class="title">Igra dneva<br>prihaja kmalu</h1>
    <p class="sub">Ta vsebina bo na voljo kmalu.<br>Ostani z nami!</p>
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Nazaj na hub
    </a>
  </div>

</body>
</html>
